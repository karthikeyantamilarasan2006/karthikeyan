<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#b30000,#ff6666);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
    text-align:center;
}

.login-box img{
    width:120px;
    height:120px;
    border-radius:50%;
    margin-bottom:15px;
}

.login-box h2{
    color:#b30000;
    margin-bottom:5px;
}

.login-box h4{
    color:#555;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#777;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="logo.png" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>
    <h4>Melmaruvathur</h4>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Study | Spirituality | Service
    </div>

</div>

</body>
</html>
